server {
    listen 80;
    listen [::]:80;
    server_name dev-api.trmx.fun;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://dev-api.trmx.fun$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev-api.trmx.fun;

    ssl_certificate /etc/letsencrypt/live/dev-api.trmx.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-api.trmx.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 20m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8001/api/v1/;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location = /docs {
        proxy_pass http://127.0.0.1:8001/docs;
    }

    location = /redoc {
        proxy_pass http://127.0.0.1:8001/redoc;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8001/openapi.json;
    }

    location / {
        return 404;
    }
}
