server {
    listen 80;
    listen [::]:80;
    server_name catmap.example.com;

    return 301 https://catmap.example.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name catmap.example.com;

    ssl_certificate /etc/nginx/ssl/catmap/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/catmap/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:catmap_ssl:10m;
    ssl_prefer_server_ciphers off;

    client_max_body_size 20m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000/api/v1/;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    location = /docs {
        proxy_pass http://127.0.0.1:8000/docs;
    }

    location = /redoc {
        proxy_pass http://127.0.0.1:8000/redoc;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
    }

    location / {
        return 404;
    }
}
