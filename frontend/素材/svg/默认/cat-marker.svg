<svg
  width="128"
  height="148"
  viewBox="0 0 128 148"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  style="--pin:#a56cff; --pin-dark:#6e31ea;"
>
  <defs>
    <!-- 地图钉主体渐变 -->
    <linearGradient id="pinGrad" x1="64" y1="10" x2="64" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:var(--pin)" />
      <stop offset="100%" style="stop-color:var(--pin-dark)" />
    </linearGradient>

    <!-- 高光 -->
    <radialGradient
      id="pinGloss"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 24) rotate(90) scale(56 64)"
    >
      <stop offset="0%" stop-color="white" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- 主体阴影 -->
    <filter id="pinShadow" x="6" y="4" width="116" height="142" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#3a1f80" flood-opacity="0.22"/>
    </filter>

    <!-- 爪印阴影 -->
    <filter id="pawShadow" x="18" y="18" width="92" height="92" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#2a165c" flood-opacity="0.18"/>
    </filter>

    <!-- 底部悬浮阴影 -->
    <radialGradient
      id="bottomShadow"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 139) scale(18 6)"
    >
      <stop offset="0%" stop-color="#24324A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#24324A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底部投影 -->
  <ellipse cx="64" cy="139" rx="18" ry="6" fill="url(#bottomShadow)" />

  <!-- 地图钉主体 -->
  <g filter="url(#pinShadow)">
    <path
      d="M64 10C36.4 10 18 29.5 18 56.8C18 92.7 58.6 130.5 62.3 133.9C63.3 134.8 64.7 134.8 65.7 133.9C69.4 130.5 110 92.7 110 56.8C110 29.5 91.6 10 64 10Z"
      fill="url(#pinGrad)"
    />
    <path
      d="M64 10C36.4 10 18 29.5 18 56.8C18 92.7 58.6 130.5 62.3 133.9C63.3 134.8 64.7 134.8 65.7 133.9C69.4 130.5 110 92.7 110 56.8C110 29.5 91.6 10 64 10Z"
      fill="url(#pinGloss)"
    />
  </g>

  <!-- 爪印 -->
  <g filter="url(#pawShadow)" fill="white">
    <!-- 四个脚趾：彼此完全分开，间隔约 5px -->
    <ellipse cx="31.5" cy="53" rx="8" ry="13"/>
    <ellipse cx="52.5" cy="42.5" rx="8" ry="14.5"/>
    <ellipse cx="75.5" cy="42.5" rx="8" ry="14.5"/>
    <ellipse cx="96.5" cy="53" rx="8" ry="13"/>

    <!-- 下方大肉垫：更贴近参考图 -->
    <path
      d="M64 62
         C72 62 78.2 65.4 83.5 72.8
         C88.1 79.3 91 85.8 91 92.8
         C91 101.2 85.2 104.5 78.7 104.5
         C74.7 104.5 71 103.5 67.4 102.5
         C65.2 101.9 62.8 101.9 60.6 102.5
         C57 103.5 53.3 104.5 49.3 104.5
         C42.8 104.5 37 101.2 37 92.8
         C37 85.8 39.9 79.3 44.5 72.8
         C49.8 65.4 56 62 64 62Z"
    />
  </g>
</svg>