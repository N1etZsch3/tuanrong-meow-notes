<svg
  width="128"
  height="148"
  viewBox="0 0 128 148"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  style="--pin:#ff6166; --pin-dark:#e52f39;"
>
  <defs>
    <!-- 地图钉主体渐变 -->
    <linearGradient id="pinGradEmergency" x1="64" y1="10" x2="64" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:var(--pin)" />
      <stop offset="100%" style="stop-color:var(--pin-dark)" />
    </linearGradient>

    <!-- 高光 -->
    <radialGradient
      id="pinGlossEmergency"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 24) rotate(90) scale(56 64)"
    >
      <stop offset="0%" stop-color="white" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- 地图钉阴影 -->
    <filter id="pinShadowEmergency" x="6" y="4" width="116" height="142" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#7f1d24" flood-opacity="0.22"/>
    </filter>

    <!-- 感叹号阴影 -->
    <filter id="markShadowEmergency" x="38" y="24" width="52" height="68" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#7f1d24" flood-opacity="0.14"/>
    </filter>

    <!-- 底部悬浮阴影 -->
    <radialGradient
      id="bottomShadowEmergency"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 139) scale(18 6)"
    >
      <stop offset="0%" stop-color="#24324A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#24324A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 底部投影 -->
  <ellipse cx="64" cy="139" rx="18" ry="6" fill="url(#bottomShadowEmergency)" />

  <!-- 地图钉主体 -->
  <g filter="url(#pinShadowEmergency)">
    <path
      d="M64 10C36.4 10 18 29.5 18 56.8C18 92.7 58.6 130.5 62.3 133.9C63.3 134.8 64.7 134.8 65.7 133.9C69.4 130.5 110 92.7 110 56.8C110 29.5 91.6 10 64 10Z"
      fill="url(#pinGradEmergency)"
    />
    <path
      d="M64 10C36.4 10 18 29.5 18 56.8C18 92.7 58.6 130.5 62.3 133.9C63.3 134.8 64.7 134.8 65.7 133.9C69.4 130.5 110 92.7 110 56.8C110 29.5 91.6 10 64 10Z"
      fill="url(#pinGlossEmergency)"
    />
  </g>

  <!-- 感叹号 -->
  <g filter="url(#markShadowEmergency)" fill="white">
    <rect x="58.5" y="34" width="11" height="38" rx="5.5" />
    <circle cx="64" cy="82.5" r="6.5" />
  </g>

  <!-- 底部小红点 -->
  <circle cx="64" cy="120.5" r="5.5" fill="var(--pin-dark)" />
</svg>