<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>猫协地图｜湖北师范大学高德地图原型</title>
  <style>
    :root {
      --page-bg: #f7f8f5;
      --card: rgba(255,255,255,.9);
      --card-strong: rgba(255,255,255,.97);
      --text: #171a20;
      --muted: #6f7683;
      --line: rgba(17,24,39,.08);
      --green: #51ae57;
      --blue: #2276ff;
      --red: #ef3038;
      --orange: #ff8b22;
      --purple: #8754e8;
      --shadow: 0 14px 40px rgba(30,39,60,.12);
      --header-h: 128px;
      --header-opacity: 1;
      --drawer-h: 292px;
      --drawer-content-opacity: 1;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-h: 78px;
      --radius: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% -10%, #fff 0, var(--page-bg) 42%, #eef5ee 100%);
    }
    button { font: inherit; border: 0; background: transparent; color: inherit; cursor: pointer; }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #fff 0%, #f7f8f5 65%, #fff 100%);
      display: flex;
      flex-direction: column;
      padding: 0 14px calc(var(--safe-bottom) + 0px);
    }

    .header {
      height: var(--header-h);
      flex: 0 0 var(--header-h);
      display: flex;
      align-items: center;
      padding: 20px 12px 12px;
      overflow: hidden;
      transition: height .2s ease, flex-basis .2s ease, padding .2s ease;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: var(--header-opacity);
      transform: translateY(calc((1 - var(--header-opacity)) * -20px));
      filter: blur(calc((1 - var(--header-opacity)) * 3px));
      transition: opacity .16s ease, transform .2s ease, filter .2s ease;
      pointer-events: none;
    }
    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 31px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: -1.1px;
    }
    .brand-title svg { width: 36px; height: 36px; flex: 0 0 auto; }
    .brand-subtitle { font-size: 15px; color: var(--muted); letter-spacing: .7px; }

    .map-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 260px;
      border-radius: var(--radius);
      overflow: hidden;
      background: #dfeadc;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.85);
      transform: translateZ(0);
    }
    #amap { position: absolute; inset: 0; width: 100%; height: 100%; }

    .map-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(29deg, rgba(255,255,255,0) 0 47%, rgba(255,255,255,.78) 48% 52%, rgba(255,255,255,0) 53% 100%) 0 0/190px 140px,
        linear-gradient(-33deg, rgba(255,255,255,0) 0 45%, rgba(255,255,255,.72) 46% 52%, rgba(255,255,255,0) 53% 100%) 0 0/170px 150px,
        radial-gradient(ellipse at 46% 66%, rgba(67,154,228,.34) 0 13%, transparent 14%),
        linear-gradient(135deg, #e6f2de, #f7f8f6 49%, #e4f2dd);
      z-index: 1;
    }
    .map-placeholder.is-hidden { display: none; }
    .placeholder-card {
      width: min(315px, 100%);
      border-radius: 20px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 14px 36px rgba(17,24,39,.14);
      padding: 18px;
      line-height: 1.65;
      color: #4b5563;
      font-size: 13px;
      backdrop-filter: blur(14px);
    }
    .placeholder-card b { color: #111827; }
    .placeholder-card code { background: #eef6ee; color: #237d36; padding: 2px 5px; border-radius: 6px; }

    .map-chip {
      position: absolute;
      left: 14px;
      top: 14px;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 10px 26px rgba(17,24,39,.1);
      backdrop-filter: blur(18px);
      font-size: 15px;
      font-weight: 760;
      user-select: none;
    }
    .map-chip svg { width: 20px; height: 20px; }
    .map-chip .chevron { width: 16px; height: 16px; opacity: .75; }

    .filter-menu {
      position: absolute;
      left: 14px;
      top: 62px;
      z-index: 45;
      width: 184px;
      display: none;
      padding: 8px;
      border-radius: 20px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(255,255,255,.86);
      box-shadow: 0 18px 38px rgba(17,24,39,.16);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
    }
    .filter-menu.is-open { display: grid; gap: 4px; }
    .filter-option {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 760;
      color: #2a313d;
      text-align: left;
      transition: background .16s ease, color .16s ease, transform .16s ease;
    }
    .filter-option:active { transform: scale(.98); }
    .filter-option.is-active {
      color: #248437;
      background: rgba(81,174,87,.12);
    }
    .filter-option-icon {
      width: 26px;
      height: 26px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 7px 16px rgba(17,24,39,.10);
      overflow: hidden;
    }
    .filter-option-icon img {
      width: 20px;
      height: 20px;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }
    .filter-option[data-filter="all"] .filter-option-icon {
      color: #29313d;
      background: rgba(17,24,39,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
    }
    .filter-option-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .point-float {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 25;
      display: none;
      align-items: center;
      gap: 11px;
      padding: 12px 13px;
      border-radius: 18px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 12px 34px rgba(17,24,39,.14);
      backdrop-filter: blur(18px);
    }
    .point-float.is-visible { display: flex; }
    .point-float .icon-pill {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      box-shadow: 0 8px 18px rgba(17,24,39,.18);
    }
    .point-float h3 { margin: 0 0 4px; font-size: 15px; line-height: 1.2; }
    .point-float p { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.35; }

    /* 高德 Marker 的真实内容。这里没有把点位写成屏幕绝对定位，位置完全交给 AMap.Marker 的经纬度控制。 */
    .real-marker {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      user-select: none;
      transform: translateY(-2px);
      cursor: pointer;
    }
    .marker-pin {
      position: relative;
      width: 32px;
      height: 41px;
      display: grid;
      place-items: center;
      color: #fff;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.18));
      flex: 0 0 32px;
    }
    .marker-pin svg { width: 100%; height: 100%; display: block; }
    .marker-label {
      margin-left: -2px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 8px 24px rgba(20,28,40,.12);
      font-size: 13px;
      font-weight: 760;
      color: #29313d;
      backdrop-filter: blur(12px);
    }
    .badge-count {
      position: absolute;
      left: 24px;
      top: -8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      display: grid;
      place-items: center;
      border: 2px solid #fff;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 5px 12px rgba(239,48,56,.34);
    }

    /*
      下拉面板和底部 Tab 已分离：
      - .drawer 是可以上下拖拽的内容面板。
      - .tabs 是固定底部主菜单，不会被拖没。
      - .drawer 收起时只剩一条横线，地图会吃掉释放出来的空间。
    */
    .drawer {
      height: var(--drawer-h);
      flex: 0 0 var(--drawer-h);
      min-height: 34px;
      margin: 10px 0 0;
      border-radius: 26px 26px 0 0;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(255,255,255,.85);
      border-bottom: 0;
      box-shadow: 0 -14px 40px rgba(30,39,60,.1);
      overflow: hidden;
      backdrop-filter: blur(18px);
      transition: height .2s ease, flex-basis .2s ease, margin .2s ease;
      display: flex;
      flex-direction: column;
      touch-action: none;
      z-index: 30;
    }
    .drawer-grip-area { flex: 0 0 34px; display: grid; place-items: center; cursor: grab; user-select: none; }
    .drawer-grip-area:active { cursor: grabbing; }
    .grip { width: 45px; height: 5px; border-radius: 999px; background: #d6dae2; }

    .drawer-content {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      opacity: var(--drawer-content-opacity);
      transform: translateY(calc((1 - var(--drawer-content-opacity)) * 8px));
      pointer-events: auto;
      transition: opacity .16s ease, transform .18s ease;
    }
    .drawer.is-collapsed .drawer-content {
      pointer-events: none;
    }

    .task-panel {
      margin: 0 0 12px;
      padding: 8px 14px 0;
      border-top: 0;
      flex: 1 1 auto;
      overflow: auto;
    }
    .task-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .task-panel h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      letter-spacing: -.45px;
      font-weight: 850;
    }
    .task-panel-head a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #7e8591;
      text-decoration: none;
      font-size: 12px;
      font-weight: 760;
    }
    .task-list { display: grid; gap: 10px; }
    .task-card {
      display: grid;
      grid-template-columns: 36px minmax(0,1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 16px 14px;
      min-height: 82px;
      border-radius: 22px;
      background: rgba(255,255,255,.98);
      border: 1px solid rgba(17,24,39,.06);
      box-shadow: 0 12px 28px rgba(30,39,60,.05);
    }
    .task-card > div:nth-child(2) { min-width: 0; }
    .task-card h3 {
      margin: 0 0 7px;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -.18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: #8b919b;
      flex-wrap: wrap;
    }
    .task-tag {
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: 760;
      font-size: 11px;
      line-height: 1.2;
    }
    .tag-red { color: var(--red); background: rgba(239,48,56,.09); }
    .tag-blue { color: var(--blue); background: rgba(34,118,255,.09); }
    .task-state-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding-left: 6px;
      color: #a1a7b2;
    }
    .task-state { font-size: 11px; font-weight: 800; }
    .state-red { color: var(--red); }
    .state-blue { color: var(--blue); }
    .task-arrow { width: 15px; height: 15px; display: block; }
    .task-icon {
      color:#fff;
      width:30px;
      height:30px;
      border-radius:50%;
      display:grid;
      place-items:center;
      box-shadow: 0 8px 18px rgba(17,24,39,.12);
    }

    .tabs {
      flex: 0 0 calc(var(--tab-h) + var(--safe-bottom));
      height: calc(var(--tab-h) + var(--safe-bottom));
      margin: 0;
      padding-bottom: var(--safe-bottom);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      box-shadow: 0 -12px 30px rgba(30,39,60,.08);
      backdrop-filter: blur(18px);
      z-index: 35;
    }
    .tab { height: var(--tab-h); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: #656b75; font-size: 13px; font-weight: 700; }
    .tab.is-active { color: var(--green); }
    .tab-icon { width: 29px; height: 29px; display: grid; place-items: center; }
    .tab-icon svg { width: 29px; height: 29px; }

    .amap-logo, .amap-copyright { opacity: .45; transform: scale(.85); transform-origin: left bottom; }

    .marker-pin {
      width: 44px;
      height: 52px;
      flex: 0 0 44px;
    }
    .marker-pin img,
    .legend-icon img,
    .task-icon img,
    .tab-icon img,
    .point-float img,
    .locate-btn img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }
    .legend-icon img { width: 14px; height: 14px; }
    .task-icon img { width: 18px; height: 18px; }
    .point-float .icon-pill {
      background: transparent !important;
      box-shadow: none;
      border-radius: 0;
    }
    .point-float > div:nth-child(2) { min-width: 0; flex: 1 1 auto; }
    .point-actions { flex: 0 0 auto; display: flex; align-items: center; gap: 8px; }
    .nav-btn {
      height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(81,174,87,.24);
    }
    .locate-btn {
      position: absolute;
      right: 14px;
      top: 14px;
      z-index: 22;
      width: 43px;
      height: 43px;
      display: grid;
      place-items: center;
      padding: 9px;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 10px 26px rgba(17,24,39,.1);
      backdrop-filter: blur(18px);
    }
    .map-toast {
      position: absolute;
      left: 50%;
      top: 66px;
      z-index: 40;
      display: none;
      max-width: calc(100% - 40px);
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(23,26,32,.82);
      color: #fff;
      font-size: 12px;
      line-height: 1.3;
      box-shadow: 0 10px 26px rgba(17,24,39,.18);
      backdrop-filter: blur(12px);
      white-space: nowrap;
    }
    .map-toast.is-visible { display: block; }
    .current-location-marker {
      display: flex;
      align-items: center;
      gap: 6px;
      transform: translateY(-2px);
      white-space: nowrap;
      user-select: none;
    }
    .current-location-marker .dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #19a7ff;
      border: 4px solid #fff;
      box-shadow: 0 0 0 8px rgba(25,167,255,.18), 0 7px 18px rgba(25,167,255,.35);
    }
    .current-location-marker .text {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 7px 20px rgba(20,28,40,.12);
      font-size: 12px;
      font-weight: 800;
      color: #167fd8;
    }


    /* 底部菜单栏 UI 优化：悬浮玻璃胶囊 + 圆润选中态 */
    :root {
      --tab-h: 74px;
      --tab-radius: 32px;
      --tab-green-soft: rgba(81,174,87,.13);
      --tab-green-glow: rgba(81,174,87,.24);
    }

    .tabs {
      position: relative;
      flex: 0 0 calc(var(--tab-h) + var(--safe-bottom) + 18px);
      height: calc(var(--tab-h) + var(--safe-bottom) + 18px);
      margin: 10px 0 10px;
      padding: 8px 8px calc(var(--safe-bottom) + 8px);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: stretch;
      gap: 6px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: var(--tab-radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.76)),
        radial-gradient(circle at 18% 0%, rgba(81,174,87,.16), transparent 42%),
        radial-gradient(circle at 86% 20%, rgba(34,118,255,.10), transparent 38%);
      box-shadow:
        0 -10px 34px rgba(35,48,72,.10),
        0 18px 42px rgba(30,39,60,.14),
        inset 0 1px 0 rgba(255,255,255,.9),
        inset 0 -1px 0 rgba(17,24,39,.04);
      backdrop-filter: blur(22px) saturate(150%);
      -webkit-backdrop-filter: blur(22px) saturate(150%);
      overflow: hidden;
      z-index: 35;
    }

    .tabs::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.95), transparent);
      pointer-events: none;
    }

    .tab {
      position: relative;
      height: auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 24px;
      color: #7a818c;
      font-size: 12px;
      font-weight: 760;
      letter-spacing: -.1px;
      transition:
        color .18s ease,
        background .18s ease,
        box-shadow .18s ease,
        transform .18s ease;
    }

    .tab::after {
      content: "";
      position: absolute;
      inset: 7px 5px;
      border-radius: 22px;
      background: transparent;
      transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
      z-index: -1;
    }

    .tab:active {
      transform: scale(.97);
    }

    .tab.is-active {
      color: #248437;
    }

    .tab.is-active::after {
      background:
        linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.58)),
        var(--tab-green-soft);
      box-shadow:
        0 10px 22px var(--tab-green-glow),
        inset 0 1px 0 rgba(255,255,255,.85),
        inset 0 -1px 0 rgba(81,174,87,.08);
    }

    .tab-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      padding: 4px;
      background: rgba(17,24,39,.035);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72);
      transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .tab-icon svg,
    .tab-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
      opacity: .68;
      transform: translateZ(0);
      transition: opacity .18s ease, transform .18s ease, filter .18s ease;
    }

    .tab.is-active .tab-icon {
      background: linear-gradient(180deg, rgba(81,174,87,.18), rgba(81,174,87,.08));
      box-shadow:
        0 7px 16px rgba(81,174,87,.18),
        inset 0 1px 0 rgba(255,255,255,.95);
      transform: translateY(-1px);
    }

    .tab.is-active .tab-icon svg,
    .tab.is-active .tab-icon img {
      opacity: 1;
      transform: scale(1.04);
      filter: drop-shadow(0 4px 7px rgba(81,174,87,.16));
    }

    .tab span:last-child {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transform: translateY(1px);
    }

    @media (max-width: 380px) {
      .tabs {
        gap: 3px;
        padding-left: 6px;
        padding-right: 6px;
      }
      .tab { font-size: 11px; }
      .tab-icon { width: 30px; height: 30px; }
      .tab-icon svg,
      .tab-icon img { width: 23px; height: 23px; }
    }

  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="header">
      <section class="brand" aria-label="页面标题">
        <div class="brand-title">
          <span>猫协地图</span>
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M23 31c4.9-.5 8.4 3.6 10.2 7.4 1.9-3.8 5.6-7.9 10.4-7.4 6.3.7 9 9.9 5.2 15-3.9 5.4-9.3 5-14.3 2.5a4 4 0 0 0-3.5 0c-5 2.5-10.4 2.9-14.3-2.5-3.8-5.1-1.1-14.3 6.3-15Z" fill="#51ae57"/>
            <ellipse cx="17" cy="22" rx="6" ry="8" fill="#51ae57"/>
            <ellipse cx="31.5" cy="16" rx="6" ry="8" fill="#51ae57"/>
            <ellipse cx="46" cy="22" rx="6" ry="8" fill="#51ae57"/>
          </svg>
        </div>

    function escapeHtml(text) {
      return String(text).replace(/[&<>'"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[s]));
    }

            ${markerIcon(cfg.markerIcon)}

          </div>
          <div class="marker-label">${escapeHtml(point.title)}</div>
        </div>
      `;
    }

      markers = filteredPoints().map(point => {
        const marker = new AMap.Marker({
          position: new AMap.LngLat(point.lng, point.lat),
          content: markerHTML(point),
          offset: new AMap.Pixel(-22, -52),
          zIndex: point.type === 'emergency_task' ? 120 : 100,
          bubble: true,
          extData: point
        });
        marker.on('click', () => showPoint(point));
        return marker;
      });
      map.add(markers);
    }

    function setActiveFilter(type) {
      activeFilter = type;
      filterLabel.textContent = activeFilter === 'all' ? '全部标记' : typeConfig[activeFilter].label;
      document.querySelectorAll('.filter-option').forEach(item => {
        item.classList.toggle('is-active', item.dataset.filter === activeFilter);
      });
      pointFloat.classList.remove('is-visible');
      if (walking && typeof walking.clear === 'function') walking.clear();
      renderMarkers();
    }

    function initMapControls() {
      document.querySelectorAll('.filter-option').forEach(btn => {
        const type = btn.dataset.filter;
        const icon = btn.querySelector('.filter-option-icon');
        const iconName = type === 'all' ? icon.dataset.icon : typeConfig[type].legendIcon;
        icon.innerHTML = svgIcon(iconName);
        btn.addEventListener('click', () => {
          setActiveFilter(type);
          filterMenu.classList.remove('is-open');
          filterChip.setAttribute('aria-expanded', 'false');
        });
      });

      const taskIcons = document.querySelectorAll('.task-icon');
      taskIcons[0].innerHTML = svgIcon('emergencyMarker');
      taskIcons[1].innerHTML = svgIcon('taskIcon');

      const tabIcons = document.querySelectorAll('.tab-icon');
      tabIcons[0].innerHTML = svgIcon('mapIcon');
      tabIcons[1].innerHTML = svgIcon('catIcon');
      tabIcons[2].innerHTML = svgIcon('taskIcon');
      tabIcons[3].innerHTML = svgIcon('profileIcon');

      locateBtn.innerHTML = svgIcon('mapIcon');
    }

    function initAmap() {
      if (!AMAP_KEY || AMAP_KEY.includes('YOUR_')) return;

      window.__initCampusCatMap = function () {
        placeholder.classList.add('is-hidden');
        map = new AMap.Map('amap', {
          center: CAMPUS_CENTER,
          zoom: DEFAULT_ZOOM,
          zooms: [15, 20],
          viewMode: '2D',
          resizeEnable: true,
          dragEnable: true,
          zoomEnable: true,
          doubleClickZoom: true,
          keyboardEnable: false,
          showLabel: true,
          mapStyle: 'amap://styles/fresh'
        });

        map.on('complete', () => {
          const limitBounds = new AMap.Bounds(CAMPUS_BOUNDS.southWest, CAMPUS_BOUNDS.northEast);
          map.setLimitBounds(limitBounds);
          renderMarkers();
        });
      };

      const script = document.createElement('script');
      script.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(AMAP_KEY)}&plugin=AMap.Geolocation,AMap.Walking&callback=__initCampusCatMap`;
      script.onerror = () => placeholder.classList.remove('is-hidden');
      document.head.appendChild(script);
    }


    function showToast(text) {
      clearTimeout(toastTimer);
      mapToast.textContent = text;
      mapToast.classList.add('is-visible');
      toastTimer = setTimeout(() => mapToast.classList.remove('is-visible'), 2600);
    }

    function setCurrentLocation(lngLat) {
      currentPosition = lngLat;
      if (userMarker) map.remove(userMarker);
      userMarker = new AMap.Marker({
        position: new AMap.LngLat(lngLat[0], lngLat[1]),
        content: '<div class="current-location-marker"><span class="dot"></span><span class="text">我的位置</span></div>',
        offset: new AMap.Pixel(-12, -12),
        zIndex: 200
      });
      map.add(userMarker);
      map.setCenter(lngLat);
    }

    function locateMe(afterLocated) {
      if (!map || !window.AMap) return;
      showToast('正在获取当前位置…');
      AMap.plugin('AMap.Geolocation', function () {
        const geolocation = new AMap.Geolocation({
          enableHighAccuracy: true,
          timeout: 10000,
          zoomToAccuracy: true,
          showCircle: true,
          showMarker: false
        });

        geolocation.getCurrentPosition(function(status, result) {
          if (status === 'complete' && result.position) {
            const lngLat = [result.position.lng, result.position.lat];
            setCurrentLocation(lngLat);
            showToast('已定位到我的位置');
            if (typeof afterLocated === 'function') afterLocated(lngLat);
          } else {
            console.warn('定位失败：', result);
            showToast('定位失败：请检查浏览器定位权限、HTTPS、GPS 或 Key 配置');
          }
        });
      });
    }

    function navigateToActivePoint() {
      if (!activePoint) {
        showToast('请先点击地图上的点位');
        return;
      }
      const drawRoute = (start) => {
        const end = [activePoint.lng, activePoint.lat];
        AMap.plugin('AMap.Walking', function () {
          if (walking && typeof walking.clear === 'function') walking.clear();
          walking = new AMap.Walking({
            map,
            hideMarkers: true,
            autoFitView: true
          });
          walking.search(start, end, function(status, result) {
            if (status === 'complete') {
              showToast('已生成步行路线');
            } else {
              console.warn('路线规划失败：', result);
              showToast('路线规划失败，校园内部小路可配合文字路线说明');
            }
          });
        });
      };

      if (currentPosition) drawRoute(currentPosition);
      else locateMe(drawRoute);
    }

    function setupDrawerDrag() {
      const MIN = 34;
      const MAX = window.innerHeight < 720 ? 260 : 292;
      let current = Math.min(MAX, parseFloat(getComputedStyle(root).getPropertyValue('--drawer-h')) || MAX);
      let startY = 0;
      let startH = current;
      let dragging = false;

      function apply(height) {
        current = Math.max(MIN, Math.min(MAX, height));
        const progress = (current - MIN) / (MAX - MIN);
        const headerH = 8 + progress * 120;
        const contentOpacity = Math.max(0, Math.min(1, (current - 76) / 120));

        root.style.setProperty('--drawer-h', `${current}px`);
        root.style.setProperty('--header-h', `${headerH}px`);
        root.style.setProperty('--header-opacity', `${progress}`);
        root.style.setProperty('--drawer-content-opacity', `${contentOpacity}`);

        drawer.classList.toggle('is-collapsed', current < 58);

        requestAnimationFrame(() => {
          if (map && typeof map.resize === 'function') map.resize();
        });
      }

      function snap() {
        const targets = [MIN, Math.round((MIN + MAX) / 2), MAX];
        let nearest = targets[0];
        for (const target of targets) {
          if (Math.abs(current - target) < Math.abs(current - nearest)) nearest = target;
        }
        apply(nearest);
      }

      grip.addEventListener('pointerdown', e => {
        dragging = true;
        startY = e.clientY;
        startH = current;
        grip.setPointerCapture(e.pointerId);
      });

      grip.addEventListener('pointermove', e => {
        if (!dragging) return;
        const deltaY = e.clientY - startY;
        apply(startH - deltaY);
      });

      grip.addEventListener('pointerup', e => {
        dragging = false;
        grip.releasePointerCapture(e.pointerId);
        snap();
      });

      grip.addEventListener('pointercancel', () => {
        dragging = false;
        snap();
      });

      grip.addEventListener('click', () => {
        if (dragging) return;
        const half = (MIN + MAX) / 2;
        apply(current > half ? MIN : MAX);
      });

      window.addEventListener('resize', () => {
        if (map && typeof map.resize === 'function') map.resize();
      });

      apply(current);
    }

    filterChip.setAttribute('aria-haspopup', 'menu');
    filterChip.setAttribute('aria-expanded', 'false');
    filterChip.addEventListener('click', e => {
      e.stopPropagation();
      const willOpen = !filterMenu.classList.contains('is-open');
      filterMenu.classList.toggle('is-open', willOpen);
      filterChip.setAttribute('aria-expanded', String(willOpen));
    });

    filterMenu.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('click', () => {
      filterMenu.classList.remove('is-open');
      filterChip.setAttribute('aria-expanded', 'false');
    });

    locateBtn.addEventListener('click', () => locateMe());
    navigateBtn.addEventListener('click', navigateToActivePoint);

    initMapControls();
    setupDrawerDrag();
    initAmap();
  </script>
</body>
</html>
