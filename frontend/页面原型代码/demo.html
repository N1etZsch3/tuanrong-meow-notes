<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>猫协地图｜首页交互原型</title>
  <style>
    :root {
      --page-bg: #f7f8f5;
      --card: rgba(255,255,255,.92);
      --card-strong: rgba(255,255,255,.98);
      --text: #171a20;
      --muted: #6f7683;
      --line: rgba(17,24,39,.08);
      --green: #51ae57;
      --blue: #2276ff;
      --red: #ef3038;
      --orange: #ff8b22;
      --purple: #8754e8;
      --shadow: 0 14px 40px rgba(30,39,60,.12);
      --header-h: 128px;
      --header-opacity: 1;
      --drawer-h: 360px;
      --drawer-content-opacity: 1;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --tab-h: 74px;
      --radius: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% -10%, #fff 0, var(--page-bg) 42%, #eef5ee 100%);
    }
    button, input, textarea { font: inherit; border: 0; background: transparent; color: inherit; }
    button { cursor: pointer; }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #fff 0%, #f7f8f5 64%, #fff 100%);
      display: flex;
      flex-direction: column;
      padding: 0 14px;
    }

    .header {
      height: var(--header-h);
      flex: 0 0 var(--header-h);
      display: flex;
      align-items: center;
      padding: 20px 12px 12px;
      overflow: hidden;
      transition: height .2s ease, flex-basis .2s ease, padding .2s ease;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: var(--header-opacity);
      transform: translateY(calc((1 - var(--header-opacity)) * -22px));
      filter: blur(calc((1 - var(--header-opacity)) * 3px));
      transition: opacity .16s ease, transform .2s ease, filter .2s ease;
      pointer-events: none;
    }
    .brand-title { display: flex; align-items: center; gap: 12px; font-size: 31px; line-height: 1; font-weight: 850; letter-spacing: -1.1px; }
    .brand-title svg { width: 36px; height: 36px; flex: 0 0 auto; }
    .brand-subtitle { font-size: 15px; color: var(--muted); letter-spacing: .7px; }

    .map-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 250px;
      border-radius: var(--radius);
      overflow: hidden;
      background: #dfeadc;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.85);
      transform: translateZ(0);
    }
    #amap { position: absolute; inset: 0; width: 100%; height: 100%; }
    .amap-logo, .amap-copyright { opacity: .45; transform: scale(.85); transform-origin: left bottom; }

    .map-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(29deg, rgba(255,255,255,0) 0 47%, rgba(255,255,255,.78) 48% 52%, rgba(255,255,255,0) 53% 100%) 0 0/190px 140px,
        linear-gradient(-33deg, rgba(255,255,255,0) 0 45%, rgba(255,255,255,.72) 46% 52%, rgba(255,255,255,0) 53% 100%) 0 0/170px 150px,
        radial-gradient(ellipse at 46% 66%, rgba(67,154,228,.34) 0 13%, transparent 14%),
        linear-gradient(135deg, #e6f2de, #f7f8f6 49%, #e4f2dd);
      z-index: 1;
    }
    .map-placeholder.is-hidden { display: none; }
    .placeholder-card { width: min(315px, 100%); border-radius: 20px; background: rgba(255,255,255,.9); box-shadow: 0 14px 36px rgba(17,24,39,.14); padding: 18px; line-height: 1.65; color: #4b5563; font-size: 13px; backdrop-filter: blur(14px); }
    .placeholder-card b { color: #111827; }
    .placeholder-card code { background: #eef6ee; color: #237d36; padding: 2px 5px; border-radius: 6px; }

    .map-chip {
      position: absolute; left: 14px; top: 14px; z-index: 35;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 18px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 10px 26px rgba(17,24,39,.1);
      backdrop-filter: blur(18px); font-size: 15px; font-weight: 760; user-select: none;
    }
    .map-chip svg { width: 20px; height: 20px; }
    .map-chip .chevron { width: 16px; height: 16px; opacity: .75; }

    .filter-menu {
      position: absolute; left: 14px; top: 62px; z-index: 80; width: 184px; display: none; padding: 8px;
      border-radius: 20px; background: rgba(255,255,255,.95); border: 1px solid rgba(255,255,255,.86);
      box-shadow: 0 18px 38px rgba(17,24,39,.16); backdrop-filter: blur(20px) saturate(150%);
    }
    .filter-menu.is-open { display: grid; gap: 4px; }
    .filter-option { width: 100%; min-width: 0; display: grid; grid-template-columns: 26px minmax(0, 1fr); align-items: center; gap: 9px; padding: 9px 10px; border-radius: 14px; font-size: 13px; font-weight: 760; color: #2a313d; text-align: left; transition: background .16s ease, color .16s ease, transform .16s ease; }
    .filter-option:active { transform: scale(.98); }
    .filter-option.is-active { color: #248437; background: rgba(81,174,87,.12); }
    .filter-option-icon { width: 26px; height: 26px; border-radius: 12px; display: grid; place-items: center; color: #fff; box-shadow: 0 7px 16px rgba(17,24,39,.10); overflow: hidden; }
    .filter-option-icon img { width: 20px; height: 20px; display: block; object-fit: contain; pointer-events: none; }
    .filter-option[data-filter="all"] .filter-option-icon { color: #29313d; background: rgba(17,24,39,.06); box-shadow: inset 0 1px 0 rgba(255,255,255,.9); }
    .filter-option-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .map-control-stack { position: absolute; right: 12px; bottom: 78px; z-index: 34; display: grid; gap: 12px; }
    .map-control { width: 58px; min-height: 58px; padding: 8px 6px; border-radius: 18px; background: rgba(255,255,255,.92); box-shadow: 0 10px 26px rgba(17,24,39,.10); display: grid; place-items: center; gap: 3px; font-size: 12px; font-weight: 760; backdrop-filter: blur(18px); }
    .map-control svg { width: 24px; height: 24px; }

    .map-toast { position: absolute; left: 50%; top: 66px; z-index: 120; display: none; max-width: calc(100% - 40px); transform: translateX(-50%); padding: 8px 12px; border-radius: 999px; background: rgba(23,26,32,.82); color: #fff; font-size: 12px; line-height: 1.3; box-shadow: 0 10px 26px rgba(17,24,39,.18); backdrop-filter: blur(12px); white-space: nowrap; }
    .map-toast.is-visible { display: block; }

    .drawer {
      height: var(--drawer-h);
      flex: 0 0 var(--drawer-h);
      min-height: 112px;
      margin: 10px 0 0;
      border-radius: 26px 26px 0 0;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(255,255,255,.88);
      border-bottom: 0;
      box-shadow: 0 -14px 40px rgba(30,39,60,.10);
      overflow: hidden;
      backdrop-filter: blur(20px) saturate(150%);
      transition: height .2s ease, flex-basis .2s ease, margin .2s ease;
      display: flex; flex-direction: column;
      touch-action: none;
      z-index: 50;
    }
    .drawer-grip-area { flex: 0 0 28px; display: grid; place-items: center; cursor: grab; user-select: none; }
    .drawer-grip-area:active { cursor: grabbing; }
    .grip { width: 45px; height: 5px; border-radius: 999px; background: #d6dae2; }
    .search-shell { flex: 0 0 auto; padding: 0 14px 12px; }
    .search-box { height: 58px; width: 100%; border: 1px solid rgba(17,24,39,.08); background: rgba(255,255,255,.98); border-radius: 22px; display: grid; grid-template-columns: 26px minmax(0, 1fr) auto; align-items: center; gap: 10px; padding: 0 16px; color: #8b919b; box-shadow: inset 0 1px 0 rgba(255,255,255,.95); }
    .search-box.is-focused { border-color: rgba(81,174,87,.58); box-shadow: 0 0 0 3px rgba(81,174,87,.12), inset 0 1px 0 rgba(255,255,255,.95); }
    .search-box svg { width: 22px; height: 22px; }
    .search-box input { width: 100%; min-width: 0; outline: 0; height: 100%; color: #202733; font-size: 15px; font-weight: 600; }
    .search-box input::placeholder { color: #9aa1ad; font-weight: 600; }
    .clear-search { display: none; width: 26px; height: 26px; border-radius: 999px; background: rgba(17,24,39,.10); color: #fff; font-weight: 900; line-height: 1; align-items: center; justify-content: center; }
    .clear-search.is-visible { display: inline-flex; }

    .drawer-content { flex: 1 1 auto; min-height: 0; overflow: auto; opacity: var(--drawer-content-opacity); transform: translateY(calc((1 - var(--drawer-content-opacity)) * 8px)); transition: opacity .16s ease, transform .18s ease; padding: 0 14px 14px; }
    .drawer.is-compact .drawer-content { pointer-events: none; }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 2px 14px; }
    .section-head h2 { margin: 0; font-size: 18px; line-height: 1; letter-spacing: -.45px; font-weight: 850; }
    .section-head a, .muted-action { display: inline-flex; align-items: center; gap: 4px; color: #7e8591; text-decoration: none; font-size: 12px; font-weight: 760; }
    .task-list, .result-list { display: grid; gap: 10px; }
    .task-card, .result-card {
      display: grid; grid-template-columns: 42px minmax(0, 1fr) auto; align-items: center; gap: 12px;
      padding: 14px; min-height: 78px; border-radius: 22px;
      background: rgba(255,255,255,.98); border: 1px solid rgba(17,24,39,.06);
      box-shadow: 0 12px 28px rgba(30,39,60,.05);
    }
    .task-card h3, .result-card h3 { margin: 0 0 7px; font-size: 15px; line-height: 1.2; font-weight: 820; letter-spacing: -.18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-meta, .result-meta { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: #8b919b; flex-wrap: wrap; }
    .task-tag, .result-type { padding: 2px 6px; border-radius: 6px; font-weight: 780; font-size: 11px; line-height: 1.2; }
    .tag-red { color: var(--red); background: rgba(239,48,56,.09); }
    .tag-blue { color: var(--blue); background: rgba(34,118,255,.09); }
    .tag-green { color: #248437; background: rgba(81,174,87,.11); }
    .tag-orange { color: var(--orange); background: rgba(255,139,34,.10); }
    .tag-purple { color: var(--purple); background: rgba(135,84,232,.10); }
    .state-red { color: var(--red); font-size: 12px; font-weight: 840; }
    .state-blue { color: var(--blue); font-size: 12px; font-weight: 840; }
    .row-arrow { width: 15px; height: 15px; color: #a1a7b2; }
    .icon-ball { color:#fff; width:38px; height:38px; border-radius:50%; display:grid; place-items:center; box-shadow: 0 8px 18px rgba(17,24,39,.12); overflow:hidden; }
    .icon-ball img, .marker-pin img, .tab-icon img, .filter-option-icon img { width: 100%; height: 100%; display: block; object-fit: contain; pointer-events: none; }
    .icon-ball img { width: 26px; height: 26px; }
    .result-thumb { width: 54px; height: 54px; border-radius: 16px; object-fit: cover; box-shadow: 0 8px 18px rgba(17,24,39,.10); }
    .chips { display: flex; gap: 8px; overflow: auto; padding: 2px 0 10px; scrollbar-width: none; }
    .chips::-webkit-scrollbar { display: none; }
    .quick-chip { display: inline-flex; align-items: center; gap: 7px; flex: 0 0 auto; padding: 10px 12px; border-radius: 16px; background: rgba(255,255,255,.98); border: 1px solid rgba(17,24,39,.06); box-shadow: 0 8px 18px rgba(30,39,60,.04); font-size: 13px; font-weight: 760; }
    .quick-chip .dot { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; overflow: hidden; }
    .quick-chip img { width: 18px; height: 18px; object-fit: contain; }
    .hint-title { margin: 8px 2px 10px; color: #262b35; font-size: 15px; font-weight: 850; }
    .empty-text { color: #9aa1ad; text-align: center; padding: 24px 0 12px; font-size: 13px; }

    .summary-card { border-radius: 25px; background: rgba(255,255,255,.98); border: 1px solid rgba(17,24,39,.06); box-shadow: 0 12px 32px rgba(30,39,60,.06); padding: 14px; }
    .summary-main { display: grid; grid-template-columns: 116px minmax(0,1fr); gap: 14px; align-items: start; }
    .summary-cover { width: 116px; height: 126px; object-fit: cover; border-radius: 20px; box-shadow: 0 12px 24px rgba(30,39,60,.10); }
    .summary-card h2 { margin: 2px 0 8px; font-size: 19px; line-height: 1.22; letter-spacing: -.55px; font-weight: 880; }
    .summary-desc { margin: 10px 0; color: #67707e; font-size: 13px; line-height: 1.55; }
    .summary-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; color: #747b87; font-size: 12px; font-weight: 700; }
    .summary-route { display: flex; gap: 8px; align-items: flex-start; color: #747b87; font-size: 12px; margin-top: 9px; line-height: 1.45; }
    .summary-actions { display: grid; grid-template-columns: 1fr 1.35fr; gap: 12px; margin-top: 16px; }
    .btn-outline, .btn-primary, .btn-plain { height: 46px; border-radius: 18px; font-size: 15px; font-weight: 850; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-outline { border: 1px solid rgba(81,174,87,.8); color: #2b8e3d; background: rgba(255,255,255,.9); }
    .btn-primary { background: linear-gradient(180deg, #63bf68, #43a84a); color: #fff; box-shadow: 0 12px 24px rgba(81,174,87,.24); }
    .btn-plain { height: 38px; padding: 0 13px; border-radius: 14px; background: rgba(17,24,39,.06); color: #444b56; font-size: 13px; }

    .admin-tools { margin-top: 14px; padding-top: 12px; border-top: 1px dashed rgba(17,24,39,.12); }
    .admin-tools-title { display:flex; align-items:center; justify-content:space-between; margin-bottom: 10px; font-size: 13px; font-weight: 850; color: #4b5563; }
    .admin-row { display:flex; gap: 8px; flex-wrap: wrap; }
    .editor-form { display: grid; gap: 9px; margin-top: 12px; }
    .editor-form label { display: grid; gap: 5px; color: #6b7280; font-size: 12px; font-weight: 800; }
    .editor-form input, .editor-form textarea { width: 100%; border-radius: 14px; background: rgba(17,24,39,.04); padding: 10px 11px; outline: 0; font-size: 13px; color: #111827; }
    .editor-form textarea { min-height: 66px; resize: none; }
    .coord-line { color: #9aa1ad; font-size: 11px; line-height: 1.4; }

    .admin-menu { position: absolute; z-index: 150; display: none; width: 178px; padding: 8px; border-radius: 20px; background: rgba(255,255,255,.96); border: 1px solid rgba(255,255,255,.86); box-shadow: 0 18px 38px rgba(17,24,39,.18); backdrop-filter: blur(20px) saturate(150%); }
    .admin-menu.is-open { display: grid; gap: 4px; }
    .admin-menu-title { color: #6b7280; font-size: 11px; font-weight: 850; padding: 4px 8px 6px; }
    .admin-menu button { display:flex; align-items:center; gap:8px; text-align:left; padding: 10px; border-radius: 14px; font-size: 13px; font-weight: 800; }
    .admin-menu button:hover { background: rgba(81,174,87,.10); }
    .admin-menu .mini-icon { width:24px; height:24px; border-radius: 10px; display:grid; place-items:center; overflow:hidden; }
    .admin-menu .mini-icon img { width:20px; height:20px; object-fit:contain; }

    .real-marker { display: flex; align-items: center; gap: 8px; white-space: nowrap; user-select: none; transform: translateY(-2px); cursor: pointer; }
    .marker-pin { position: relative; width: 44px; height: 52px; display: grid; place-items: center; color: #fff; filter: drop-shadow(0 8px 12px rgba(0,0,0,.18)); flex: 0 0 44px; transition: transform .16s ease, filter .16s ease; }
    .marker-label { margin-left: -2px; padding: 8px 12px; border-radius: 12px; background: rgba(255,255,255,.92); box-shadow: 0 8px 24px rgba(20,28,40,.12); font-size: 13px; font-weight: 760; color: #29313d; backdrop-filter: blur(12px); }
    .marker-preview { margin-left: -4px; height: 46px; display: flex; align-items: center; gap: 8px; padding: 5px 10px 5px 5px; border-radius: 15px; background: rgba(255,255,255,.94); box-shadow: 0 10px 26px rgba(20,28,40,.14); backdrop-filter: blur(14px); font-size: 13px; font-weight: 800; color: #29313d; }
    .marker-preview img { width: 36px; height: 36px; border-radius: 11px; object-fit: cover; }
    .marker-bare .marker-label, .marker-bare .marker-preview { display: none; }
    .marker-title .marker-preview { display: none; }
    .marker-card .marker-label { display: none; }
    .real-marker.is-selected .marker-pin { transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 0 rgba(0,0,0,0)) drop-shadow(0 8px 13px rgba(0,0,0,.18)); }
    .real-marker.is-selected .marker-pin::before { content:""; position:absolute; inset:-9px -7px 0; border-radius: 50%; background: radial-gradient(circle, rgba(239,48,56,.26), rgba(239,48,56,0) 68%); z-index:-1; }
    .real-marker.is-editing .marker-pin { animation: markerPulse 1.2s infinite; }
    @keyframes markerPulse { 0%,100% { transform: translateY(-3px) scale(1.06); } 50% { transform: translateY(-6px) scale(1.12); } }
    .badge-count { position: absolute; left: 29px; top: -8px; width: 22px; height: 22px; border-radius: 50%; background: var(--red); color: #fff; display: grid; place-items: center; border: 2px solid #fff; font-size: 12px; font-weight: 900; box-shadow: 0 5px 12px rgba(239,48,56,.34); }
    .current-location-marker { display: flex; align-items: center; gap: 6px; transform: translateY(-2px); white-space: nowrap; user-select: none; }
    .current-location-marker .dot { width: 24px; height: 24px; border-radius: 50%; background: #19a7ff; border: 4px solid #fff; box-shadow: 0 0 0 8px rgba(25,167,255,.18), 0 7px 18px rgba(25,167,255,.35); }
    .current-location-marker .text { padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.94); box-shadow: 0 7px 20px rgba(20,28,40,.12); font-size: 12px; font-weight: 800; color: #167fd8; }

    .tabs { position: relative; flex: 0 0 calc(var(--tab-h) + var(--safe-bottom) + 18px); height: calc(var(--tab-h) + var(--safe-bottom) + 18px); margin: 10px 0 10px; padding: 8px 8px calc(var(--safe-bottom) + 8px); display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); align-items: stretch; gap: 6px; border: 1px solid rgba(255,255,255,.82); border-radius: 32px; background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.76)), radial-gradient(circle at 18% 0%, rgba(81,174,87,.16), transparent 42%), radial-gradient(circle at 86% 20%, rgba(34,118,255,.10), transparent 38%); box-shadow: 0 -10px 34px rgba(35,48,72,.10), 0 18px 42px rgba(30,39,60,.14), inset 0 1px 0 rgba(255,255,255,.9), inset 0 -1px 0 rgba(17,24,39,.04); backdrop-filter: blur(22px) saturate(150%); overflow: hidden; z-index: 65; }
    .tab { position: relative; height: auto; min-width: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border-radius: 24px; color: #7a818c; font-size: 12px; font-weight: 760; letter-spacing: -.1px; transition: color .18s ease, background .18s ease, box-shadow .18s ease, transform .18s ease; }
    .tab::after { content: ""; position: absolute; inset: 7px 5px; border-radius: 22px; background: transparent; transition: background .18s ease, box-shadow .18s ease; z-index: -1; }
    .tab.is-active { color: #248437; }
    .tab.is-active::after { background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.58)), rgba(81,174,87,.13); box-shadow: 0 10px 22px rgba(81,174,87,.24), inset 0 1px 0 rgba(255,255,255,.85), inset 0 -1px 0 rgba(81,174,87,.08); }
    .tab-icon { width: 32px; height: 32px; display: grid; place-items: center; border-radius: 15px; padding: 4px; background: rgba(17,24,39,.035); box-shadow: inset 0 1px 0 rgba(255,255,255,.72); }
    .tab-icon img { width: 24px; height: 24px; opacity: .68; }
    .tab.is-active .tab-icon { background: linear-gradient(180deg, rgba(81,174,87,.18), rgba(81,174,87,.08)); box-shadow: 0 7px 16px rgba(81,174,87,.18), inset 0 1px 0 rgba(255,255,255,.95); transform: translateY(-1px); }
    .tab.is-active .tab-icon img { opacity: 1; transform: scale(1.04); filter: drop-shadow(0 4px 7px rgba(81,174,87,.16)); }

    @media (max-width: 380px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .brand-title { font-size: 28px; }
      .summary-main { grid-template-columns: 96px minmax(0,1fr); }
      .summary-cover { width:96px; height:112px; }
      .summary-card h2 { font-size: 17px; }
      .map-control { width:54px; min-height:54px; font-size:11px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="header">
      <section class="brand" aria-label="页面标题">
        <div class="brand-title">
          <span>猫协地图</span>
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M23 31c4.9-.5 8.4 3.6 10.2 7.4 1.9-3.8 5.6-7.9 10.4-7.4 6.3.7 9 9.9 5.2 15-3.9 5.4-9.3 5-14.3 2.5a4 4 0 0 0-3.5 0c-5 2.5-10.4 2.9-14.3-2.5-3.8-5.1-1.1-14.3 6.3-15Z" fill="#51ae57"/>
            <ellipse cx="17" cy="22" rx="6" ry="8" fill="#51ae57"/>
            <ellipse cx="31.5" cy="16" rx="6" ry="8" fill="#51ae57"/>
            <ellipse cx="46" cy="22" rx="6" ry="8" fill="#51ae57"/>
          </svg>
        </div>
        <div class="brand-subtitle">探索校园 · 守护猫咪</div>
      </section>
    </header>

    <section class="map-wrap" id="mapWrap">
      <div id="amap"></div>
      <div class="map-placeholder" id="mapPlaceholder">
        <div class="placeholder-card">

        { id: 't_daily_2', type: 'daily_task', title: '宿舍区C夜间巡查', subtitle: '日常巡查', desc: '检查宿舍区C附近猫咪出现情况，记录是否有异常。', lng: 115.06475, lat: 30.22755, distance: 310, statusText: '可接取', participants: '1/3 人参与', routeHint: '宿舍区C入口右侧绿化带。', taskStatus: 'pending' },
        { id: 'lm_north_gate', type: 'landmark', title: '北门', subtitle: '校园出入口', desc: '湖北师范大学北门，常作为校内导航参照点。', lng: 115.06225, lat: 30.23218, distance: 80, statusText: '地标', routeHint: '校内北侧主出入口。' },
        { id: 'lm_library', type: 'landmark', title: '图书馆', subtitle: '校园地标', desc: '图书馆附近有常见投喂路线和临时观察点。', lng: 115.05785, lat: 30.22995, distance: 210, statusText: '地标', routeHint: '位于主干道西侧。' },
        { id: 'lm_canteen', type: 'landmark', title: '食堂', subtitle: '校园地标', desc: '食堂周边经常出现投喂与清洁任务。', lng: 115.06495, lat: 30.22895, distance: 230, statusText: '地标', routeHint: '从行政楼向东北方向步行。' }
      ]
    };
    MOCK_API.points.forEach(p => p.cover = cover(p.type, p.title));

    const typeConfig = {
      cat: { label: '常驻猫咪', color: '#8754e8', markerIcon: 'catMarker', panelIcon: 'catIcon', tagClass: 'tag-purple', resultType: '猫咪' },
      supply: { label: '物资点', color: '#ff8b22', markerIcon: 'supplyMarker', panelIcon: 'supplyMarker', tagClass: 'tag-orange', resultType: '物资' },
      daily_task: { label: '日常任务', color: '#2276ff', markerIcon: 'taskMarker', panelIcon: 'taskIcon', tagClass: 'tag-blue', resultType: '任务' },
      emergency_task: { label: '紧急任务', color: '#ef3038', markerIcon: 'emergencyMarker', panelIcon: 'emergencyMarker', tagClass: 'tag-red', resultType: '任务' },
      landmark: { label: '地标地址', color: '#51ae57', markerIcon: 'mapIcon', panelIcon: 'mapIcon', tagClass: 'tag-green', resultType: '地标' }
    };

    const root = document.documentElement;
    const drawer = document.getElementById('drawer');
    const grip = document.getElementById('drawerGrip');
    const drawerContent = document.getElementById('drawerContent');
    const searchBox = document.getElementById('searchBox');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const filterLabel = document.getElementById('filterLabel');
    const filterChip = document.getElementById('filterChip');
    const filterMenu = document.getElementById('filterMenu');
    const mapWrap = document.getElementById('mapWrap');
    const placeholder = document.getElementById('mapPlaceholder');
    const mapToast = document.getElementById('mapToast');
    const locateBtn = document.getElementById('locateBtn');
    const myLocationBtn = document.getElementById('myLocationBtn');
    const layerBtn = document.getElementById('layerBtn');
    const adminQuickMenu = document.getElementById('adminQuickMenu');

    let map = null;
    let walking = null;
    let markers = [];
    let userMarker = null;
    let currentPosition = null;
    let activeFilter = 'all';
    let activePoint = null;
    let query = '';
    let mode = 'default';
    let currentZoom = DEFAULT_ZOOM;
    let quickInsertLngLat = null;
    let toastTimer = null;

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>'"]/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[s]));
    }
    function assetImg(name) { return `<img src="${SVG_ASSETS[name]}" alt="" />`; }
    function iconBall(type) {
      const cfg = typeConfig[type] || typeConfig.daily_task;
      return `<span class="icon-ball" style="background:${cfg.color}">${assetImg(cfg.panelIcon)}</span>`;
    }
    function markerIcon(name) { return `<img src="${SVG_ASSETS[name]}" alt="" />`; }
    function pointTypeLabel(point) { return typeConfig[point.type]?.label || '点位'; }
    function pointTag(point) { const cfg = typeConfig[point.type] || typeConfig.daily_task; return `<span class="task-tag ${cfg.tagClass}">${cfg.label}</span>`; }
    function filteredPoints() {
      const points = MOCK_API.points;
      if (activeFilter === 'all') return points;
      return points.filter(p => p.type === activeFilter);
    }
    function isTask(point) { return point.type === 'daily_task' || point.type === 'emergency_task'; }
    function latestTasks() { return MOCK_API.points.filter(isTask).slice(0, 3); }
    function myAcceptedTasks() { return MOCK_API.points.filter(p => MOCK_API.currentUser.acceptedTaskIds.includes(p.id)); }
    function searchPoints(q) {
      const kw = q.trim().toLowerCase();
      if (!kw) return [];
      return MOCK_API.points.filter(p => [p.title, p.subtitle, p.desc, p.routeHint, pointTypeLabel(p)].join(' ').toLowerCase().includes(kw));
    }

    function showToast(text) {
      clearTimeout(toastTimer);
      mapToast.textContent = text;
      mapToast.classList.add('is-visible');
      toastTimer = setTimeout(() => mapToast.classList.remove('is-visible'), 2600);
    }

    function markerClass() {
      if (currentZoom < 16.65) return 'marker-bare';
      if (currentZoom >= 18) return 'marker-card';
      return 'marker-title';
    }

    function markerHTML(point) {
      const cfg = typeConfig[point.type] || typeConfig.daily_task;
      const selectedClass = activePoint?.id === point.id ? 'is-selected' : '';
      const editingClass = point.editing ? 'is-editing' : '';
      return `<div class="real-marker ${markerClass()} ${selectedClass} ${editingClass}" data-id="${point.id}">
        <div class="marker-pin">${markerIcon(cfg.markerIcon)}${point.badge ? `<span class="badge-count">${point.badge}</span>` : ''}</div>
        <div class="marker-label">${escapeHtml(point.title)}</div>
        <div class="marker-preview"><img src="${point.cover}" alt="" /><span>${escapeHtml(point.title)}</span></div>
      </div>`;
    }

    function renderMarkers() {
      if (!map || !window.AMap) return;
      if (markers.length) map.remove(markers);
      markers = [];
      markers = filteredPoints().map(point => {
        const marker = new AMap.Marker({
          position: new AMap.LngLat(point.lng, point.lat),
          content: markerHTML(point),
          offset: new AMap.Pixel(-22, -52),
          zIndex: point.type === 'emergency_task' ? 130 : activePoint?.id === point.id ? 150 : 100,
          bubble: true,
          draggable: MOCK_API.currentUser.role === 'admin' && !!point.editing,
          cursor: point.editing ? 'move' : 'pointer',
          extData: point
        });
        marker.on('click', () => selectPoint(point.id, { center: false }));
        marker.on('dragend', ev => {
          point.lng = ev.lnglat.lng;
          point.lat = ev.lnglat.lat;
          showToast(`已更新坐标：${point.lng.toFixed(6)}, ${point.lat.toFixed(6)}`);
          renderDrawerContent();
        });
        markers.push(marker);
        return marker;
      });
      map.add(markers);
    }

    function renderTaskCard(point) {
      const isEmergency = point.type === 'emergency_task';
      return `<article class="task-card" data-point-id="${point.id}">
        ${iconBall(point.type)}
        <div><h3>${escapeHtml(point.title)}</h3><div class="task-meta">${pointTag(point)}<span>·</span><span>距离 ${point.distance}m</span></div></div>
        <div style="display:flex;align-items:center;gap:8px;"><span class="${isEmergency ? 'state-red' : 'state-blue'}">${escapeHtml(point.statusText || '查看')}</span><svg class="row-arrow" viewBox="0 0 20 20" aria-hidden="true"><path d="m7 4.5 5.5 5.5L7 15.5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </article>`;
    }

    function renderDefaultPanel() {
      const mine = myAcceptedTasks();
      if (mine.length) {
        return `<div class="section-head"><h2>我的进行中任务</h2><a href="javascript:void(0)">查看全部 ›</a></div><div class="task-list">${mine.map(renderTaskCard).join('')}</div>`;
      }
      return `<div class="section-head"><h2>最新任务</h2><a href="javascript:void(0)">查看全部 ›</a></div><div class="task-list">${latestTasks().map(renderTaskCard).join('')}</div>`;
    }

    function renderSearchPanel() {
      if (!query.trim()) {
        const recent = ['北门', '小橘（常驻）', '图书馆', '体育馆', '猫协物资点 #1', '食堂后方投喂清洁'];
        const guess = ['猫协物资点 #2', '食堂', '学生服务中心', '行政楼', '紧急任务', '日常任务'];
        return `<div class="section-head"><h2>最近搜索</h2><button class="muted-action" type="button">清除</button></div>
          <div class="chips">${recent.map(x => `<button class="quick-chip" data-search="${escapeHtml(x)}" type="button"><span class="dot" style="background:rgba(81,174,87,.12)">${assetImg('mapIcon')}</span>${escapeHtml(x)}</button>`).join('')}</div>
          <div class="hint-title">猜你想搜</div>
          <div class="chips" style="flex-wrap:wrap;overflow:visible;">${guess.map(x => `<button class="quick-chip" data-search="${escapeHtml(x)}" type="button"><span class="dot" style="background:rgba(17,24,39,.06)">${assetImg('mapIcon')}</span>${escapeHtml(x)}</button>`).join('')}</div>`;
      }
      const results = searchPoints(query);
      return `<div class="section-head"><h2>搜索“${escapeHtml(query)}”</h2><span class="muted-action">${results.length} 个结果</span></div>
        <div class="result-list">${results.map(point => {
          const cfg = typeConfig[point.type] || typeConfig.daily_task;
          return `<article class="result-card" data-point-id="${point.id}">
            ${iconBall(point.type)}
            <div><h3>${escapeHtml(point.title)}</h3><div class="result-meta"><span class="result-type ${cfg.tagClass}">${cfg.resultType}</span><span>${escapeHtml(point.subtitle || pointTypeLabel(point))}</span><span>·</span><span>${point.distance}m</span></div></div>
            <img class="result-thumb" src="${point.cover}" alt="" />
          </article>`;
        }).join('') || `<div class="empty-text">没有匹配到相关点位、地标或地址</div>`}</div>`;
    }

    function renderSelectedPanel(point) {
      const cfg = typeConfig[point.type] || typeConfig.daily_task;
      const taskMeta = isTask(point) ? `<span>👥 ${escapeHtml(point.participants || '0/3 人参与')}</span>` : '';
      const adminPart = MOCK_API.currentUser.role === 'admin' ? `<div class="admin-tools">
        <div class="admin-tools-title"><span>管理员点位操作</span><span>${point.editing ? '编辑状态：可拖拽 Marker' : '预留入口'}</span></div>
        <div class="admin-row">
          <button class="btn-plain" data-action="edit-point" type="button">${point.editing ? '退出编辑' : '编辑点位'}</button>
          <button class="btn-plain" data-action="save-point" type="button">保存位置</button>
        </div>
        ${point.editing ? `<div class="editor-form">
          <label>点位标题 <input id="editTitle" value="${escapeHtml(point.title)}" /></label>
          <label>简要说明 <textarea id="editDesc">${escapeHtml(point.desc || '')}</textarea></label>
          <div class="coord-line">当前坐标：lng ${point.lng.toFixed(7)}，lat ${point.lat.toFixed(7)}。拖拽地图上的 Marker 后坐标会同步变化。</div>
        </div>` : ''}
      </div>` : '';
      return `<article class="summary-card" data-summary-id="${point.id}">
        <div class="summary-main">
          <img class="summary-cover" src="${point.cover}" alt="" />
          <div>
            <h2>${escapeHtml(point.title)}</h2>
            <div class="task-meta">${pointTag(point)}<span>·</span><span>${escapeHtml(point.statusText || '可查看')}</span></div>
            <p class="summary-desc">${escapeHtml(point.desc || '暂无点位说明。')}</p>
            <div class="summary-meta"><span>📍 距离 ${point.distance ?? '--'}m</span>${taskMeta}</div>
            <div class="summary-route"><span>↝</span><span>${escapeHtml(point.routeHint || '暂无路线说明。')}</span></div>
          </div>
        </div>
        <div class="summary-actions">
          <button class="btn-outline" type="button" data-action="detail">查看详情</button>
          <button class="btn-primary" type="button" data-action="navigate">➤ 导航到这里</button>
        </div>
        ${adminPart}
      </article>`;
    }

    function renderDrawerContent() {
      clearSearch.classList.toggle('is-visible', !!query);
      if (mode === 'selected' && activePoint) drawerContent.innerHTML = renderSelectedPanel(activePoint);
      else if (mode === 'search') drawerContent.innerHTML = renderSearchPanel();
      else drawerContent.innerHTML = renderDefaultPanel();
    }

    function setDrawerHeight(height, nextMode = mode) {
      const compact = 112;
      const expanded = Math.max(560, Math.min(window.innerHeight - 118, 680));
      const defaultH = window.innerHeight < 720 ? 318 : 360;
      const clamped = Math.max(compact, Math.min(expanded, height));
      const normalized = (clamped - compact) / (expanded - compact);
      let headerH;
      if (nextMode === 'search') headerH = Math.max(0, 40 - normalized * 80);
      else headerH = 8 + Math.min(1, Math.max(0, (clamped - compact) / (defaultH - compact))) * 120;
      const headerOpacity = Math.max(0, Math.min(1, headerH / 128));
      const contentOpacity = Math.max(0, Math.min(1, (clamped - 128) / 100));
      root.style.setProperty('--drawer-h', `${clamped}px`);
      root.style.setProperty('--header-h', `${headerH}px`);
      root.style.setProperty('--header-opacity', `${headerOpacity}`);
      root.style.setProperty('--drawer-content-opacity', `${contentOpacity}`);
      drawer.classList.toggle('is-compact', clamped < 138);
      requestAnimationFrame(() => { if (map && typeof map.resize === 'function') map.resize(); });
    }

    function expandSearch() {
      mode = 'search';
      activePoint = null;
      searchBox.classList.add('is-focused');
      renderMarkers();
      setDrawerHeight(Math.max(560, Math.min(window.innerHeight - 118, 680)), mode);
      renderDrawerContent();
      setTimeout(() => searchInput.focus(), 40);
    }
    function collapseToMap() {
      mode = query ? 'search' : 'default';
      searchBox.classList.toggle('is-focused', mode === 'search');
      setDrawerHeight(112, mode);
      renderDrawerContent();
    }
    function defaultHome() {
      mode = activePoint ? 'selected' : (query ? 'search' : 'default');
      setDrawerHeight(window.innerHeight < 720 ? 318 : 360, mode);
      renderDrawerContent();
    }

    function selectPoint(id, options = {}) {
      const point = MOCK_API.points.find(p => p.id === id);
      if (!point) return;
      activePoint = point;
      mode = 'selected';
      searchInput.blur();
      searchBox.classList.remove('is-focused');
      if (map && options.center !== false) {
        map.setZoomAndCenter(Math.max(currentZoom, 17.5), [point.lng, point.lat]);
      }
      renderMarkers();
      defaultHome();
    }

    function navigateToActivePoint() {
      if (!activePoint) return showToast('请先选择一个点位');
      const drawRoute = (start) => {
        const end = [activePoint.lng, activePoint.lat];
        AMap.plugin('AMap.Walking', function () {
          if (walking && typeof walking.clear === 'function') walking.clear();
          walking = new AMap.Walking({ map, hideMarkers: true, autoFitView: true });
          walking.search(start, end, function(status, result) {
            if (status === 'complete') showToast('已生成步行路线');
            else showToast('路线规划失败，可按点位路线说明前往');
          });
        });
      };
      if (currentPosition) drawRoute(currentPosition);
      else locateMe(drawRoute);
    }

    function setCurrentLocation(lngLat) {
      currentPosition = lngLat;
      if (userMarker) map.remove(userMarker);
      userMarker = new AMap.Marker({
        position: new AMap.LngLat(lngLat[0], lngLat[1]),
        content: '<div class="current-location-marker"><span class="dot"></span><span class="text">我的位置</span></div>',
        offset: new AMap.Pixel(-12, -12),
        zIndex: 220
      });
      map.add(userMarker);
      map.setCenter(lngLat);
    }

    function locateMe(afterLocated) {
      if (!map || !window.AMap) return;
      showToast('正在获取当前位置…');
      AMap.plugin('AMap.Geolocation', function () {
        const geolocation = new AMap.Geolocation({ enableHighAccuracy: true, timeout: 10000, zoomToAccuracy: true, showCircle: true, showMarker: false });
        geolocation.getCurrentPosition(function(status, result) {
          if (status === 'complete' && result.position) {
            const lngLat = [result.position.lng, result.position.lat];
            setCurrentLocation(lngLat);
            showToast('已定位到我的位置');
            if (typeof afterLocated === 'function') afterLocated(lngLat);
          } else {
            showToast('定位失败：请检查定位权限、HTTPS 或 Key 配置');
          }
        });
      });
    }

    function setupDrawerDrag() {
      let current = parseFloat(getComputedStyle(root).getPropertyValue('--drawer-h')) || 360;
      let startY = 0, startH = current, dragging = false;
      const compact = 112;
      const defaultH = window.innerHeight < 720 ? 318 : 360;
      const expanded = Math.max(560, Math.min(window.innerHeight - 118, 680));
      grip.addEventListener('pointerdown', e => { dragging = true; startY = e.clientY; startH = current; grip.setPointerCapture(e.pointerId); });
      grip.addEventListener('pointermove', e => { if (!dragging) return; const deltaY = e.clientY - startY; current = Math.max(compact, Math.min(expanded, startH - deltaY)); setDrawerHeight(current, current > defaultH + 70 ? 'search' : mode); });
      function finish(e) {
        if (!dragging) return;
        dragging = false;
        try { grip.releasePointerCapture(e.pointerId); } catch(_) {}
        if (current < (compact + defaultH) / 2) { current = compact; collapseToMap(); }
        else if (current > defaultH + 70) { current = expanded; expandSearch(); }
        else { current = defaultH; defaultHome(); }
      }
      grip.addEventListener('pointerup', finish);
      grip.addEventListener('pointercancel', finish);
      grip.addEventListener('click', () => { if (dragging) return; if (mode === 'search') defaultHome(); else collapseToMap(); });
      window.addEventListener('resize', () => { if (map && typeof map.resize === 'function') map.resize(); });
      setDrawerHeight(current, mode);
    }

    function setActiveFilter(type) {
      activeFilter = type;
      filterLabel.textContent = activeFilter === 'all' ? '全部标记' : typeConfig[activeFilter].label;
      document.querySelectorAll('.filter-option').forEach(item => item.classList.toggle('is-active', item.dataset.filter === activeFilter));
      filterMenu.classList.remove('is-open');
      filterChip.setAttribute('aria-expanded', 'false');
      activePoint = null;
      mode = query ? 'search' : 'default';
      if (walking && typeof walking.clear === 'function') walking.clear();
      renderMarkers();
      renderDrawerContent();
    }

    function openAdminMenu(lngLat, pixel) {
      if (MOCK_API.currentUser.role !== 'admin') return;
      quickInsertLngLat = lngLat;
      const rect = mapWrap.getBoundingClientRect();
      let x = pixel?.x ?? rect.width / 2;
      let y = pixel?.y ?? rect.height / 2;
      x = Math.max(10, Math.min(rect.width - 188, x));
      y = Math.max(10, Math.min(rect.height - 240, y));
      adminQuickMenu.style.left = x + 'px';
      adminQuickMenu.style.top = y + 'px';
      adminQuickMenu.classList.add('is-open');
      showToast('管理员快速插点：选择点位类型');
    }

    function createQuickPoint(type) {
      if (!quickInsertLngLat) return;
      const cfg = typeConfig[type] || typeConfig.daily_task;
      const point = {
        id: `draft_${Date.now()}`,
        type,
        title: `新建${cfg.label}`,
        subtitle: '管理员快速插点草稿',
        desc: '长按地图创建的点位草稿，可继续编辑标题、说明和坐标。',
        lng: quickInsertLngLat.lng ?? quickInsertLngLat[0],
        lat: quickInsertLngLat.lat ?? quickInsertLngLat[1],
        distance: 0,
        statusText: '草稿',
        routeHint: '请补充路线说明、入口提示和现场照片。',
        editing: true
      };
      point.cover = cover(type, point.title);
      MOCK_API.points.push(point);
      adminQuickMenu.classList.remove('is-open');
      selectPoint(point.id);
      showToast('已创建点位草稿，Marker 已进入可拖拽编辑状态');
    }

    function toggleEditActivePoint() {
      if (!activePoint) return;
      activePoint.editing = !activePoint.editing;
      if (activePoint.editing) showToast('已进入编辑状态，可拖拽地图上的 Marker');
      else showToast('已退出编辑状态');
      renderMarkers();
      renderDrawerContent();
    }

    function saveActivePointForm() {
      if (!activePoint) return;
      const title = document.getElementById('editTitle')?.value?.trim();
      const desc = document.getElementById('editDesc')?.value?.trim();
      if (title) activePoint.title = title;
      if (desc !== undefined) activePoint.desc = desc;
      activePoint.cover = cover(activePoint.type, activePoint.title);
      activePoint.editing = false;
      renderMarkers();
      renderDrawerContent();
      showToast('已保存点位信息和经纬度');
    }

    function initMapControls() {
      document.querySelectorAll('.filter-option').forEach(btn => {
        const type = btn.dataset.filter;
        const icon = btn.querySelector('.filter-option-icon');
        const iconName = type === 'all' ? icon.dataset.icon : typeConfig[type].markerIcon;
        icon.innerHTML = assetImg(iconName);
        btn.addEventListener('click', () => setActiveFilter(type));
      });
      document.querySelectorAll('.admin-menu [data-create]').forEach(btn => {
        const type = btn.dataset.create;
        btn.querySelector('.mini-icon').innerHTML = assetImg(typeConfig[type].markerIcon);
        btn.addEventListener('click', () => createQuickPoint(type));
      });
      const tabIcons = document.querySelectorAll('.tab-icon');
      tabIcons[0].innerHTML = assetImg('mapIcon');
      tabIcons[1].innerHTML = assetImg('catIcon');
      tabIcons[2].innerHTML = assetImg('taskIcon');
      tabIcons[3].innerHTML = assetImg('profileIcon');
    }

    function initAmap() {
      if (!AMAP_KEY || AMAP_KEY.includes('YOUR_')) return;
      window.__initCampusCatMap = function () {
        placeholder.classList.add('is-hidden');
        map = new AMap.Map('amap', {
          center: CAMPUS_CENTER, zoom: DEFAULT_ZOOM, zooms: [15, 20], viewMode: '2D', resizeEnable: true,
          dragEnable: true, zoomEnable: true, doubleClickZoom: true, keyboardEnable: false, showLabel: true, mapStyle: 'amap://styles/fresh'
        });
        map.on('complete', () => {
          const limitBounds = new AMap.Bounds(CAMPUS_BOUNDS.southWest, CAMPUS_BOUNDS.northEast);
          map.setLimitBounds(limitBounds);
          currentZoom = map.getZoom();
          renderMarkers();
        });
        map.on('zoomend', () => { currentZoom = map.getZoom(); renderMarkers(); });
        map.on('click', () => { adminQuickMenu.classList.remove('is-open'); });
        map.on('rightclick', ev => openAdminMenu(ev.lnglat, ev.pixel));
        map.on('longpress', ev => openAdminMenu(ev.lnglat, ev.pixel));
      };
      const script = document.createElement('script');
      script.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(AMAP_KEY)}&plugin=AMap.Geolocation,AMap.Walking&callback=__initCampusCatMap`;
      script.onerror = () => placeholder.classList.remove('is-hidden');
      document.head.appendChild(script);
    }

    filterChip.setAttribute('aria-haspopup', 'menu');
    filterChip.setAttribute('aria-expanded', 'false');
    filterChip.addEventListener('click', e => { e.stopPropagation(); const willOpen = !filterMenu.classList.contains('is-open'); filterMenu.classList.toggle('is-open', willOpen); filterChip.setAttribute('aria-expanded', String(willOpen)); });
    filterMenu.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('click', () => { filterMenu.classList.remove('is-open'); filterChip.setAttribute('aria-expanded', 'false'); adminQuickMenu.classList.remove('is-open'); });
    adminQuickMenu.addEventListener('click', e => e.stopPropagation());

    searchBox.addEventListener('click', e => { e.stopPropagation(); expandSearch(); });
    searchInput.addEventListener('input', e => { query = e.target.value; mode = 'search'; searchBox.classList.add('is-focused'); renderDrawerContent(); });
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') { const first = searchPoints(query)[0]; if (first) selectPoint(first.id); } });
    clearSearch.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); query = ''; searchInput.value = ''; mode = 'search'; renderDrawerContent(); searchInput.focus(); });
    drawerContent.addEventListener('click', e => {
      const quick = e.target.closest('[data-search]');
      if (quick) { query = quick.dataset.search; searchInput.value = query; mode = 'search'; renderDrawerContent(); return; }
      const row = e.target.closest('[data-point-id]');
      if (row) { selectPoint(row.dataset.pointId); return; }
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (action === 'navigate') navigateToActivePoint();
      if (action === 'detail') showToast('详情页接口后续接入任务/猫咪/物资模块');
      if (action === 'edit-point') toggleEditActivePoint();
      if (action === 'save-point') saveActivePointForm();
    });

    locateBtn.addEventListener('click', () => locateMe());
    myLocationBtn.addEventListener('click', () => locateMe());
    layerBtn.addEventListener('click', () => showToast('图层切换入口：后续可接校园平面图/自定义图层'));

    initMapControls();
    renderDrawerContent();
    setupDrawerDrag();
    initAmap();
  </script>
</body>
</html>
