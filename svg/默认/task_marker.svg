      <stop offset="0%" stop-color="white" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="task-pin-shadow" x="8" y="4" width="112" height="140" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#15366f" flood-opacity="0.22"/>
    </filter>

    <filter id="task-glyph-shadow" x="20" y="14" width="88" height="90" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#15366f" flood-opacity="0.18"/>
    </filter>

    <radialGradient id="task-bottom-shadow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(64 139) scale(18 6)">
      <stop offset="0%" stop-color="#23304A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#23304A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="64" cy="139" rx="18" ry="6" fill="url(#task-bottom-shadow)"/>

  <g filter="url(#task-pin-shadow)">
    <path
