  height="148"
  viewBox="0 0 128 148"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  style="--pin:#2d8cff; --pin-dark:#0f5ff0; --ink:#1b63f3;"
>
  <defs>
    <linearGradient id="task-pin-grad" x1="64" y1="10" x2="64" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:var(--pin)" />
      <stop offset="100%" style="stop-color:var(--pin-dark)" />
    </linearGradient>

    <radialGradient id="task-pin-gloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
